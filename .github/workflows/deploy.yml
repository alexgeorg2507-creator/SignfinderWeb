name: Deploy Web — Test

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read web version
        run: |
          BASE=$(cat version.txt | tr -d '[:space:]')
          WEB_VERSION="${BASE}.${{ github.run_number }}"
          echo "WEB_VERSION=$WEB_VERSION" >> $GITHUB_ENV
          echo "Version: $WEB_VERSION"

      - name: Inject version into cabinet HTML
        run: |
          # Remove any previously injected __SF_VERSION__ script, then re-inject
          sed -i 's|<script>window\.__SF_VERSION__[^<]*</script>||g' app/index.html
          sed -i "s|</head>|<script>window.__SF_VERSION__ = '${{ env.WEB_VERSION }}';</script></head>|" app/index.html

      - name: Deploy to Firebase Hosting (test)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.GOOGLE_CREDENTIALS_TEST }}"
          projectId: signfinder-cab-test
          channelId: live
