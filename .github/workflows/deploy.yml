name: Deploy Web (Firebase Hosting)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read web version
        run: |
          WEB_VERSION=$(cat version.txt 2>/dev/null || echo "1.0.0")
          echo "WEB_VERSION=$WEB_VERSION" >> $GITHUB_ENV

      - name: Inject version into cabinet HTML
        run: |
          VERSION_TAG="${{ env.WEB_VERSION }}"
          # inject or replace window.__SF_VERSION__
          if grep -q '__SF_VERSION__' app/index.html; then
            sed -i "s|window\.__SF_VERSION__\s*=\s*['\"][^'\"]*['\"]|window.__SF_VERSION__ = '${VERSION_TAG}'|g" app/index.html
          else
            sed -i "s|</head>|<script>window.__SF_VERSION__ = '${VERSION_TAG}';</script></head>|" app/index.html
          fi
          echo "Injected version: $VERSION_TAG"

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS_PROD }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Firebase Hosting (prod)
        run: |
          npm install -g firebase-tools --silent
          firebase deploy --only hosting --project=signfinder-prod

      - name: Notify Telegram — web deployed
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WEB_VERSION: ${{ env.WEB_VERSION }}
          JOB_STATUS: ${{ job.status }}
          GH_RUN: ${{ github.run_number }}
          GH_ACTOR: ${{ github.actor }}
        run: |
          pip install requests -q
          python3 - <<'PYEOF'
          import os, requests
          bot_token = os.environ.get("TELEGRAM_BOT_TOKEN", "")
          chat_id   = os.environ.get("TELEGRAM_CHAT_ID", "")
          if not bot_token or not chat_id:
              print("Telegram secrets not set — skipping")
              exit(0)
          status  = os.environ.get("JOB_STATUS", "unknown")
          web_v   = os.environ.get("WEB_VERSION", "?")
          run_n   = os.environ.get("GH_RUN", "?")
          actor   = os.environ.get("GH_ACTOR", "?")
          icon = "\u2705" if status == "success" else "\U0001f6a8"
          text = (
              f"{icon} SignFinder PROD — Web deployed\n"
              f"Web:  v{web_v}\n"
              f"URL:  https://signfinder.app\n"
              f"Status: {status} | run #{run_n} by {actor}"
          )
          resp = requests.post(
              f"https://api.telegram.org/bot{bot_token}/sendMessage",
              json={"chat_id": chat_id, "text": text},
              timeout=10,
          )
          print(f"Telegram: {resp.status_code}")
          PYEOF
