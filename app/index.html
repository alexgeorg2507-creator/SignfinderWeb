<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --c-bg: #f8f8f6;
    --c-surface: #ffffff;
    --c-border: #e4e4e0;
    --c-text: #1a1a18;
    --c-muted: #6b6b68;
    --c-accent: #2563eb;
    --c-accent-bg: #eff6ff;
    --c-danger: #dc2626;
    --c-success: #16a34a;
    --c-success-bg: #f0fdf4;
    --radius: 10px;
    --shadow: 0 1px 3px rgba(0,0,0,.08);
  }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--c-bg); color: var(--c-text); min-height: 100vh; font-size: 16px; line-height: 1.5; }

  /* ── screens ── */
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }

  /* ── auth screen ── */
  #screen-auth { align-items: center; justify-content: center; padding: 1.5rem; }
  .auth-card { background: var(--c-surface); border: 1px solid var(--c-border); border-radius: 16px; padding: 2.5rem 2rem; max-width: 400px; width: 100%; box-shadow: var(--shadow); }
  .auth-logo { font-size: 22px; font-weight: 600; margin-bottom: 0.5rem; }
  .auth-sub { color: var(--c-muted); font-size: 14px; margin-bottom: 2rem; }
  .btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 0.75rem 1rem; border-radius: var(--radius); border: 1px solid var(--c-border); background: var(--c-surface); font-size: 15px; cursor: pointer; transition: background .15s; font-family: inherit; color: var(--c-text); }
  .btn:hover { background: var(--c-bg); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn-primary { background: var(--c-accent); color: #fff; border-color: var(--c-accent); }
  .btn-primary:hover:not(:disabled) { background: #1d4ed8; border-color: #1d4ed8; }
  .divider { display: flex; align-items: center; gap: 0.75rem; margin: 1.25rem 0; color: var(--c-muted); font-size: 13px; }
  .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--c-border); }
  .input { width: 100%; padding: 0.65rem 0.85rem; border: 1px solid var(--c-border); border-radius: var(--radius); font-size: 15px; font-family: inherit; color: var(--c-text); background: var(--c-surface); outline: none; transition: border-color .15s; margin-bottom: 0.75rem; }
  .input:focus { border-color: var(--c-accent); }
  .form-link { font-size: 13px; color: var(--c-accent); cursor: pointer; background: none; border: none; padding: 0; margin-top: 0.75rem; display: block; text-align: center; }

  /* ── verify screen ── */
  #screen-verify { align-items: center; justify-content: center; padding: 1.5rem; }
  .verify-card { background: var(--c-surface); border: 1px solid var(--c-border); border-radius: 16px; padding: 2.5rem 2rem; max-width: 400px; width: 100%; text-align: center; }
  .verify-card h2 { font-size: 20px; margin-bottom: 0.5rem; }
  .verify-card p { color: var(--c-muted); font-size: 14px; margin-bottom: 1.5rem; line-height: 1.6; }

  /* ── cabinet ── */
  #screen-cabinet { flex-direction: column; }
  .topbar { background: var(--c-surface); border-bottom: 1px solid var(--c-border); padding: 0 1.5rem; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .topbar-logo { font-size: 17px; font-weight: 600; }
  .topbar-user { display: flex; align-items: center; gap: 0.75rem; font-size: 14px; color: var(--c-muted); }
  .btn-logout { font-size: 13px; color: var(--c-muted); background: none; border: 1px solid var(--c-border); border-radius: 8px; padding: 0.35rem 0.75rem; cursor: pointer; font-family: inherit; }
  .btn-logout:hover { background: var(--c-bg); }
  /* Fix-21: гамбургер + выпадающее меню вместо нижнего sticky-меню — тот же
     класс бага (базовое правило после media-запроса) уже один раз тихо
     сломал нижнее меню незаметно для глаза; топбар всегда виден и не
     зависит от position:sticky/safe-area на дне экрана, поэтому надёжнее. */
  .hamburger-btn { display: none; align-items: center; justify-content: center;
    width: 34px; height: 34px; border: 1px solid var(--c-border); border-radius: 8px;
    background: var(--c-surface); cursor: pointer; color: var(--c-text); flex-shrink: 0; }
  .hamburger-btn svg { width: 18px; height: 18px; display: block; }
  .mobile-dropdown { display: none; position: fixed; top: 64px; right: 1rem;
    background: var(--c-surface); border: 1px solid var(--c-border); border-radius: 10px;
    box-shadow: var(--shadow); z-index: 20; overflow: hidden; min-width: 190px; }
  .mobile-dropdown.open { display: block; }
  .mobile-dropdown-item { display: flex; align-items: center; gap: 0.6rem;
    padding: 0.75rem 1rem; font-size: 14px; cursor: pointer; color: var(--c-text); }
  .mobile-dropdown-item:hover { background: var(--c-bg); }
  .mobile-dropdown-item.active { color: var(--c-accent); background: var(--c-accent-bg); }
  @media (max-width: 600px) {
    .hamburger-btn { display: flex; }
    #topbar-email { display: none; }
  }
  .cabinet-layout { display: flex; flex: 1; min-height: 0; }
  .sidebar { width: 220px; border-right: 1px solid var(--c-border); background: var(--c-surface); padding: 1rem 0; flex-shrink: 0; }
  .nav-item { display: flex; align-items: center; gap: 0.65rem; padding: 0.65rem 1.25rem; font-size: 14px; cursor: pointer; color: var(--c-muted); border-left: 3px solid transparent; transition: all .15s; }
  .nav-item:hover { background: var(--c-bg); color: var(--c-text); }
  .nav-item.active { color: var(--c-accent); border-left-color: var(--c-accent); background: var(--c-accent-bg); }
  .nav-icon { font-size: 18px; width: 20px; text-align: center; }
  .main-content { flex: 1; padding: 2rem 1.5rem; max-width: 720px; overflow-y: auto; }
  .main-content.wide { max-width: none; padding: 1rem 1.5rem; overflow: hidden; display: flex; flex-direction: column; height: calc(100vh - 56px); }
  .section-title { font-size: 20px; font-weight: 600; margin-bottom: 0.25rem; }
  .section-sub { color: var(--c-muted); font-size: 14px; margin-bottom: 1.5rem; }
  .card { background: var(--c-surface); border: 1px solid var(--c-border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
  .stub { color: var(--c-muted); font-size: 14px; text-align: center; padding: 3rem 1rem; }

  /* ── msg ── */
  .msg { font-size: 13px; padding: 0.6rem 0.85rem; border-radius: 8px; margin-bottom: 0.75rem; display: none; }
  .msg.error { background: #fef2f2; color: var(--c-danger); border: 1px solid #fecaca; display: block; }
  .msg.info { background: var(--c-accent-bg); color: var(--c-accent); border: 1px solid #bfdbfe; display: block; }
  .msg.success { background: var(--c-success-bg); color: var(--c-success); border: 1px solid #bbf7d0; display: block; }

  /* ── signature tab extras ── */
  .sig-grid { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem; }
  .sig-col { flex: 1; min-width: 140px; text-align: center; }
  .sig-col-label { font-size: 12px; color: var(--c-muted); margin-bottom: 0.4rem; }
  .sig-img { max-width: 100%; max-height: 120px; border: 1px solid var(--c-border); border-radius: 8px; padding: 4px; }
  .sig-img-processed { background: repeating-conic-gradient(#ddd 0% 25%, #fff 0% 50%) 0 0 / 12px 12px; }
  .sig-meta { font-size: 13px; color: var(--c-muted); margin-bottom: 1rem; }
  .upload-label { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 0.75rem 1rem; border-radius: var(--radius); border: 1.5px dashed var(--c-border); background: var(--c-bg); font-size: 15px; cursor: pointer; transition: border-color .15s, background .15s; color: var(--c-muted); margin-bottom: 0; }
  .upload-label:hover { border-color: var(--c-accent); background: var(--c-accent-bg); color: var(--c-accent); }
  .sig-current-badge { display: flex; align-items: center; gap: 0.5rem; font-size: 12px; color: var(--c-success); margin-bottom: 0.75rem; }

  /* ── hint text ── */
  .hint { font-size: 12px; color: var(--c-muted); margin-bottom: 0.75rem; line-height: 1.5; }

  /* ── work tab ── */
  .usage-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; font-size: 14px; }
  .usage-bar-bg { height: 6px; background: var(--c-border); border-radius: 3px; overflow: hidden; }
  .usage-bar-fill { height: 100%; border-radius: 3px; transition: width .3s; }
  .privacy-note { display: flex; align-items: flex-start; gap: 0.5rem; font-size: 12px; color: var(--c-muted); margin-bottom: 1rem; line-height: 1.5; }
  .traffic-pill { display: inline-flex; align-items: center; gap: 0.4rem; font-size: 14px; font-weight: 500; padding: 0.35rem 0.75rem; border-radius: 20px; margin-bottom: 0.75rem; }
  .traffic-pill.green  { background: var(--c-success-bg); color: var(--c-success); }
  .traffic-pill.yellow { background: #fffbeb; color: #92400e; }
  .traffic-pill.red    { background: #fef2f2; color: var(--c-danger); }
  .party-row   { display: flex; align-items: center; gap: 0.5rem; font-size: 13px; padding: 0.3rem 0; }
  .party-badge { font-size: 11px; background: var(--c-accent-bg); color: var(--c-accent); border-radius: 4px; padding: 0.15rem 0.4rem; }

  /* ── work tab: PDF preview ── */
  .work-layout { display: grid; grid-template-columns: 300px 1fr; gap: 1.5rem; align-items: start; flex: 1; min-height: 0; overflow: hidden; }
  .work-left-col { overflow-y: auto; height: 100%; padding-right: 4px; }
  @media (max-width: 900px) {
    .main-content.wide { height: auto; overflow: visible; }
    .work-layout { grid-template-columns: 1fr; overflow: visible; }
    .work-left-col { height: auto; overflow: visible; }
    .pdf-preview-panel { height: 60vw; min-height: 300px; }
  }
  .pdf-preview-panel { background: #fff; border: 1px solid var(--c-border);
    border-radius: 10px; overflow: hidden;
    display: flex; flex-direction: column; height: 100%; }
  .pdf-preview-toolbar { padding: 0.4rem 0.75rem; font-size: 12px; color: var(--c-muted);
    border-bottom: 1px solid var(--c-border); display: flex;
    align-items: center; justify-content: space-between;
    background: var(--c-surface); flex-shrink: 0; }
  .pdf-canvas-scroll { flex: 1; overflow-y: auto; background: #f0f0ee; padding: 1rem;
    display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .pdf-canvas-page { background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.12); max-width: 100%; }
  /* Fix-20: пустое состояние — заголовок вверху + инструкция, не по центру */
  .pdf-preview-empty { flex: 1; display: flex; flex-direction: column; align-items: center;
    color: var(--c-muted); font-size: 13px; padding: 1.75rem 1.5rem; overflow: hidden; }
  .pdf-preview-empty-title { font-size: 15px; font-weight: 600; color: var(--c-text);
    text-align: center; margin-bottom: 1.1rem; }
  .pdf-preview-instructions { max-width: 460px; width: 100%; }
  .pdf-preview-instructions .point-up { font-size: 13px; color: var(--c-accent);
    text-align: center; margin-bottom: 1rem; }
  .pdf-preview-instructions ol { margin: 0.75rem 0 0; padding-left: 1.15rem; display: flex;
    flex-direction: column; gap: 0.7rem; }
  .pdf-preview-instructions li { font-size: 13px; line-height: 1.55; color: var(--c-muted); }
  .pdf-preview-instructions li b { color: var(--c-text); }
  .icon-legend { display: flex; flex-direction: column; gap: 0.55rem; margin-bottom: 0.25rem; }
  .icon-legend-row { display: flex; align-items: flex-start; gap: 0.6rem; font-size: 13px; color: var(--c-muted); line-height: 1.45; }
  .icon-legend-row b { color: var(--c-text); }
  .inst-icon { display: inline-flex; align-items: center; justify-content: center;
    width: 26px; height: 26px; flex-shrink: 0; border: 1px solid var(--c-border);
    border-radius: 7px; background: var(--c-surface); color: var(--c-muted); }
  .inst-icon svg { width: 14px; height: 14px; display: block; }
  .preview-actions { display: flex; gap: 0.4rem; }
  .icon-btn { display: flex; align-items: center; justify-content: center;
    width: 30px; height: 30px; padding: 0; border: 1px solid var(--c-border);
    border-radius: 8px; background: var(--c-surface); cursor: pointer;
    color: var(--c-muted); transition: background .15s, color .15s, border-color .15s; }
  .icon-btn:hover { background: var(--c-bg); }
  .icon-btn svg { width: 16px; height: 16px; display: block; }
  .icon-btn.active { color: var(--c-accent); border-color: var(--c-accent); background: var(--c-accent-bg); }
  #btn-remember.active svg { fill: currentColor; }
  /* Fix-20: инструменты всегда видны — неактивные тускнеют, а не пропадают */
  .icon-btn.disabled { opacity: 0.35; cursor: default; pointer-events: none; }

  /* Fix-20: строка с приватностью + лимитом документов, перенесена в панель превью */
  .pdf-preview-info-strip { display: flex; align-items: center; justify-content: space-between;
    gap: 0.75rem; padding: 0.45rem 0.75rem; font-size: 11px; color: var(--c-muted);
    border-bottom: 1px solid var(--c-border); background: var(--c-bg); flex-shrink: 0; flex-wrap: wrap; }
  .pdf-preview-info-strip b { color: var(--c-text); }

  /* Fix-20: статус-сообщения (спиннер/msg) — тонкая строка над превью, не отдельная карточка */
  .work-spinner-bar { display: none; align-items: center; gap: 0.5rem; padding: 0.5rem 0.75rem;
    font-size: 13px; color: var(--c-muted); border-bottom: 1px solid var(--c-border); flex-shrink: 0; }
  @keyframes sf-spin { to { transform: rotate(360deg); } }
  .work-spinner-icon { display: inline-block; animation: sf-spin 1.3s linear infinite; }

  /* ── Fix-7: manual signature placement ── */
  .pdf-page-wrap { position: relative; }
  .pdf-page-wrap.placing { cursor: crosshair; }
  .sig-placer { position: absolute; border: 2px dashed var(--c-accent);
    background: rgba(37,99,235,0.06); touch-action: none; cursor: move; }
  .sig-placer img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; user-select: none; }
  .sig-placer-handle { position: absolute; right: -7px; bottom: -7px; width: 14px; height: 14px;
    background: var(--c-accent); border: 2px solid #fff; border-radius: 50%;
    cursor: nwse-resize; touch-action: none; box-shadow: 0 1px 3px rgba(0,0,0,.3); }
  .sig-placer-controls { position: absolute; top: -32px; right: 0; display: flex; gap: 4px; }
  .sig-placer-controls button { width: 24px; height: 24px; border-radius: 50%; border: none;
    cursor: pointer; font-size: 13px; line-height: 1; display: flex; align-items: center;
    justify-content: center; box-shadow: 0 1px 3px rgba(0,0,0,.25); }
  .sig-placer-confirm { background: var(--c-success); color: #fff; }
  .sig-placer-cancel { background: var(--c-danger); color: #fff; }

  /* ── responsive ── */
  /* Fix-21: нижнее sticky-меню (.mobile-nav) убрано — заменено гамбургером
     в топбаре (см. .hamburger-btn/.mobile-dropdown выше). Причина замены,
     не просто ещё одна правка: Fix-18 починил реальный CSS-баг (базовое
     правило после media-запроса всегда побеждало) и это было ПОДТВЕРЖДЕНО
     через getComputedStyle, но на living iPhone меню всё равно было не
     видно — либо кэш Firebase Hosting (Cache-Control: max-age=3600) отдал
     старую версию, либо position:sticky снизу экрана по-своему
     взаимодействует с iOS Safari (сворачивающийся тулбар браузера меняет
     реальную высоту вьюпорта). Топбар уже наверху, всегда виден и не
     зависит ни от того, ни от другого — надёжнее по конструкции, а не
     просто "ещё одна попытка".*/
  @media (max-width: 600px) {
    .sidebar { display: none; }
    .main-content { padding: 1rem; }
  }
</style>
<script type="module">
  import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs';
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';
  window._pdfjsLib = pdfjsLib;
</script>
</head>
<body>

<!-- ── Auth screen ── -->
<div id="screen-auth" class="screen active">
  <div class="auth-card">
    <div class="auth-logo">SignFinder</div>
    <div class="auth-sub">Подпись договоров за минуту</div>

    <div id="auth-msg" class="msg"></div>

    <button class="btn" id="btn-google" onclick="signInGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M17.64 9.2c0-.638-.057-1.252-.164-1.84H9v3.48h4.844a4.14 4.14 0 0 1-1.796 2.717v2.258h2.908C16.657 14.108 17.64 11.863 17.64 9.2z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.185l-2.908-2.258c-.806.54-1.837.859-3.048.859-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/><path d="M3.964 10.705A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.705V4.963H.957A9 9 0 0 0 0 9c0 1.452.348 2.827.957 4.037l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.963L3.964 7.295C4.672 5.168 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
      Войти через Google
    </button>

    <div class="divider">или через email</div>

    <div id="form-signin">
      <input class="input" type="email" id="inp-email" placeholder="email@example.com">
      <input class="input" type="password" id="inp-pass" placeholder="Пароль">
      <button class="btn btn-primary" onclick="signInEmail()">Войти</button>
      <button class="form-link" onclick="showRegister()">Нет аккаунта? Зарегистрироваться</button>
    </div>

    <div id="form-register" style="display:none">
      <input class="input" type="email" id="inp-reg-email" placeholder="email@example.com">
      <input class="input" type="password" id="inp-reg-pass" placeholder="Пароль (минимум 8 символов)">
      <button class="btn btn-primary" onclick="registerEmail()">Создать аккаунт</button>
      <button class="form-link" onclick="showSignin()">Уже есть аккаунт? Войти</button>
    </div>
  </div>
</div>

<!-- ── Verify email screen ── -->
<div id="screen-verify" class="screen">
  <div class="verify-card">
    <div style="font-size:48px; margin-bottom:1rem">📧</div>
    <h2>Подтвердите email</h2>
    <p>Мы отправили письмо на <strong id="verify-email"></strong>.<br>Перейдите по ссылке в письме, затем вернитесь сюда.</p>
    <button class="btn btn-primary" onclick="checkVerified()" style="margin-bottom:0.75rem">Я подтвердил</button>
    <button class="btn" onclick="resendVerification()">Отправить письмо повторно</button>
    <button class="form-link" onclick="signOut()">Выйти</button>
  </div>
</div>

<!-- ── Cabinet screen ── -->
<div id="screen-cabinet" class="screen">
  <div class="topbar">
    <div class="topbar-logo">
      SignFinder
    </div>
    <div class="topbar-user">
      <span id="topbar-email"></span>

// ── API helper ─────────────────────────────────────────────────────────────
async function apiFetch(path, opts = {}) {
  const token = await refreshToken();
  const headers = { Authorization: "Bearer " + token };
  if (!(opts.body instanceof FormData)) {
    headers["Content-Type"] = "application/json";
  }
  return fetch("/api" + path, { ...opts, headers: { ...headers, ...opts.headers } });
}

// ── Profile ────────────────────────────────────────────────────────────────
function _updateVersionFooter() {
  const footer = document.getElementById("profile-version-footer");
  if (!footer) return;
  const webV = (typeof window.__SF_VERSION__ !== 'undefined') ? window.__SF_VERSION__ : 'dev';
  footer.textContent = _cachedVersionStr
    ? `Web v${webV} \u00b7 ${_cachedVersionStr}`
    : `Web v${webV}`;
}

async function loadProfile() {
  _updateVersionFooter();
  if (!_cachedVersionStr) {
    apiFetch("/v1/version").then(r => r.ok ? r.json() : null).then(d => {
      if (d) {
        const apiVer = d.api_build ? `${d.api_version}.${d.api_build}` : (d.api_version || '?');
        _cachedVersionStr = `API v${apiVer} \u00b7 Core v${d.signfinder_core_version || '?'}`;
        _updateVersionFooter();
      }
    }).catch(() => {});
  }
  const res = await apiFetch("/v1/me/profile");
  if (!res.ok) return;
  const data = await res.json();
  const n = document.getElementById("pf-name");
  const c = document.getElementById("pf-company");
  if (n) n.value = data.full_name || "";
  if (c) c.value = data.company || "";
  _initProfileAutosave();
}

function _initProfileAutosave() {
  ['pf-name', 'pf-company'].forEach(id => {
    const el = document.getElementById(id);
    if (!el || el._autosaveAttached) return;
    el._autosaveAttached = true;
    el.addEventListener('blur', () => saveProfile());
  });
}

window.saveProfile = async () => {
  const body = {
    full_name: document.getElementById("pf-name").value.trim(),
    company:   document.getElementById("pf-company").value.trim(),
    requisites: "",
  };
  const res = await apiFetch("/v1/me/profile", { method: "PUT", body: JSON.stringify(body) });
  const ok = res.ok;
  if (!ok) showTabMsg("profile-msg", "Ошибка сохранения", "error");
  if (ok && window.posthog) posthog.capture("profile_filled");
};

// ── Signature ──────────────────────────────────────────────────────────────
function initSignatureTab() {
  loadCurrentSignature();
  const fileInput = document.getElementById("sig-file");
  if (fileInput) fileInput.addEventListener("change", onSigFileChange);
}

async function loadCurrentSignature() {
  const el = document.getElementById("sig-current");
  if (!el) return;
  el.innerHTML = '<div style="font-size:13px;color:var(--c-muted);padding:0.5rem 0">⏳ Загружаем подпись...</div>';
  const token = await refreshToken();
  let res;
  try {
    res = await fetch("/api/v1/me/signature", { headers: { Authorization: "Bearer " + token } });
  } catch {
    el.innerHTML = '<div style="font-size:13px;color:var(--c-danger);margin-bottom:0.75rem">⚠️ Нет связи с сервером</div>';
    return;
  }
  if (res.ok) {
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    el.innerHTML = `
      <div style="margin-bottom:1rem">
        <div class="sig-col-label" style="margin-bottom:0.4rem">Текущая подпись</div>
        <img src="${url}" class="sig-img sig-img-processed" style="max-height:72px">
        <div class="sig-current-badge">✓ Подпись загружена</div>
      </div>`;
  } else if (res.status === 404) {
    el.innerHTML = '<div style="font-size:13px;color:var(--c-muted);margin-bottom:0.75rem">Подпись ещё не загружена</div>';
  } else {
    el.innerHTML = '<div style="font-size:13px;color:var(--c-danger);margin-bottom:0.75rem">⚠️ Не удалось загрузить текущую подпись</div>';
  }
}

async function onSigFileChange(e) {
  const file = e.target.files[0];
  if (!file) return;

  // Show original preview immediately
  document.getElementById("sig-original").src = URL.createObjectURL(file);
  document.getElementById("sig-preview").style.display = "none";
  document.getElementById("sig-processing").style.display = "block";
  document.getElementById("sig-msg").className = "msg";
  _processedSigB64 = null;

  // Process on server (OpenCV: crop, HSV+adaptive, RGBA transparent bg)
  const fd = new FormData();
  fd.append("file", file);
  let res;
  try {
    res = await apiFetch("/v1/me/signature/process", { method: "POST", body: fd });
  } catch {
    document.getElementById("sig-processing").style.display = "none";
    showTabMsg("sig-msg", "Ошибка соединения", "error");
    return;
  }

  document.getElementById("sig-processing").style.display = "none";

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    showTabMsg("sig-msg", err.detail || "Ошибка обработки", "error");
    return;
  }

  const data = await res.json();
  _processedSigB64 = data.processed_png_b64;

  // Show processed preview
  document.getElementById("sig-processed").src = "data:image/png;base64," + data.processed_png_b64;
  document.getElementById("sig-preview").style.display = "block";

  // Confidence / warnings
  const pct = Math.round((data.confidence || 0) * 100);
  const warns = (data.warnings || []).length
    ? "⚠️ " + data.warnings.join("; ")
    : "✓ Обработка успешна";
  document.getElementById("sig-meta").textContent = `Качество: ${pct}%  •  ${warns}`;
}

async function initWorkTab() {
  loadWorkUsage();
  _workSigReady = false;
  // Pre-load party template and signature readiness in parallel
  const [partyRes, sigRes] = await Promise.all([
    apiFetch("/v1/me/party"),
    apiFetch("/v1/me/signature"),
  ]);
  if (partyRes.ok) _workPartyTemplate = await partyRes.json();
  _workSigReady = sigRes.ok;

  const fileInput = document.getElementById("work-file");
  if (fileInput) fileInput.addEventListener("change", e => {
    const f = e.target.files[0]; if (f) handleWorkFile(f);
  });

  // Drag & drop on the drop zone label
  const dz = document.getElementById("work-dropzone");
  if (dz) {
    dz.addEventListener("dragover", e => { e.preventDefault(); dz.style.borderColor = "var(--c-accent)"; dz.style.background = "var(--c-accent-bg)"; });
    dz.addEventListener("dragleave", () => { dz.style.borderColor = ""; dz.style.background = ""; });
    dz.addEventListener("drop", e => {
      e.preventDefault(); dz.style.borderColor = ""; dz.style.background = "";
      const f = e.dataTransfer.files[0]; if (f) handleWorkFile(f);
    });
  }

  // Restore document state if returning to work tab. Fix-19: stay on
  // _currentVisiblePage (persists across tab switches — only the DOM gets
  // torn down and rebuilt, not this variable) instead of jumping to
  // _firstSignedPageNum()/page 1 — that jump was what made returning to the
  // tab read as "the document reset" even though nothing was actually lost.
  if (_signedBlob) {
    showPdfPreview(_signedBlob, _currentVisiblePage || 1, _buildPreviewLabel(_workAnalyzeResult, _workFile.name));
    _updateToolbarActions();
    if (_workAnchors) {
      document.getElementById("work-result-card").style.display = "block";
      renderAnalysisResult(_workAnalyzeResult || { anchors: _workAnchors });
    }
  } else if (_workFile) {
    // _workFile is always a PDF here — handleWorkFile converts DOC/DOCX
    // to PDF via /v1/me/convert before storing it.
    showPdfPreview(_workFile, _currentVisiblePage || 1, _buildPreviewLabel(_workAnalyzeResult, _workFile.name));
    _updateToolbarActions();
    if (_workAnchors) {
      document.getElementById("work-result-card").style.display = "block";
      renderAnalysisResult(_workAnalyzeResult || { anchors: _workAnchors });
    }
  }
}

function _firstSignedPageNum() {
  if (_workAnchors && _workAnchors.length) {
    return parseInt(_workAnchors[0].page_hint || "0", 10) + 1;

  if (_manualAnchors.length) return _manualAnchors[0].page;
  return 1;
}

  }

// ── PDF preview panel ─────────────────────────────────────────────────────

// Fix-11: preview header shows filename + whether this run was a fresh LLM
// pass or a reapplied remembered template — visual diagnostic without DevTools.
function _truncateFilename(name, maxLen = 30) {
  if (!name) return '';
  if (name.length <= maxLen) return name;
  const extMatch = name.match(/\.[^.]+$/);
  const ext = extMatch ? extMatch[0] : '';
  const base = ext ? name.slice(0, -ext.length) : name;
  const keep = maxLen - ext.length - 1; // -1 под символ "…"
  if (keep <= 0) return name.slice(0, maxLen) + '…';
  return base.slice(0, keep) + '…' + ext;
}

function _buildPreviewLabel(analyzeResult, filename) {
  const fname = _truncateFilename(filename, 30);
  if (analyzeResult && analyzeResult.from_template) {
    const tplName = analyzeResult.template_name
      ? _truncateFilename(analyzeResult.template_name, 24)
      : (analyzeResult.template_id || '').slice(0, 8);
    return `${fname} · Применён шаблон: ${tplName}`;
  }
  if (analyzeResult) {
    return `${fname} · Распознано`;
  }
  return fname;  // до завершения анализа — просто имя файла
}

async function showPdfPreview(pdfBlobOrFile, pageNumber, label) {
  const scrollEl = document.getElementById('pdf-canvas-scroll');
  const empty    = document.getElementById('pdf-preview-empty');
  const toolbar  = document.getElementById('pdf-preview-toolbar');
  const lbl      = document.getElementById('pdf-preview-label');
  const pagesLbl = document.getElementById('pdf-preview-pages');
  if (!scrollEl) return;

  const myToken = ++_currentRenderToken;

  if (!window._pdfjsLib) {
    _fallbackIframePreview(pdfBlobOrFile, pageNumber, label);
    return;
  }

  // Reveal the container (and its layout/clientWidth) up front, but leave its
  // *children* untouched until the new pages are ready — old canvases (if any)
  // stay visible the whole time instead of a blank flash (Fix-7 C.7). This
  // also matters on the very first render of a session: pdf-canvas-scroll
  // starts display:none, and computing containerWidth against a display:none
  // element would give clientWidth=0 → a broken negative scale.
  scrollEl.style.display = 'flex';
  empty.style.display = 'none';
  lbl.textContent = label || 'Предпросмотр';
  const infoStrip = document.getElementById('pdf-preview-info-strip');
  if (infoStrip) infoStrip.style.display = 'none';

  const arrayBuffer = await pdfBlobOrFile.arrayBuffer();
  if (myToken !== _currentRenderToken) return;

  const pdf = await window._pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  if (myToken !== _currentRenderToken) return;

  const containerWidth = scrollEl.clientWidth - 32;
  const dpr = window.devicePixelRatio || 1;

  // Fix-7: render into a detached fragment and swap in with one replaceChildren()
  // once every page is ready — the old preview (if any) stays on screen the
  // whole time instead of flashing empty mid-render.
  const fragment = document.createDocumentFragment();
  let targetWrapEl = null;

  for (let i = 1; i <= pdf.numPages; i++) {
    if (myToken !== _currentRenderToken) return;
    const page = await pdf.getPage(i);
    const baseViewport = page.getViewport({ scale: 1 });
    const scale = Math.min(containerWidth / baseViewport.width, 1.6);
    const viewport = page.getViewport({ scale: scale * dpr });

    const canvas = document.createElement('canvas');
    canvas.className = 'pdf-canvas-page';
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    canvas.style.width  = (viewport.width  / dpr) + 'px';
    canvas.style.height = (viewport.height / dpr) + 'px';
    canvas.dataset.pageNum = i;
    // Fix-7: PDF-points-per-CSS-pixel ratio for this page, used by
    // canvasToPdfCoords() to place manual signatures.
    canvas._pdfScale = scale;
    canvas._pdfWidthPt = baseViewport.width;
    canvas._pdfHeightPt = baseViewport.height;

    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
    if (myToken !== _currentRenderToken) return;

    const wrap = document.createElement('div');
    wrap.className = 'pdf-page-wrap';
    wrap.dataset.pageNum = i;
    wrap.style.width = canvas.style.width;
    wrap.style.height = canvas.style.height;
    wrap.appendChild(canvas);
    fragment.appendChild(wrap);
    if (i === pageNumber) targetWrapEl = wrap;
  }

  if (myToken !== _currentRenderToken) return;

  scrollEl.replaceChildren(fragment);
  if (pagesLbl) pagesLbl.textContent = pdf.numPages + ' стр.';

  _attachPageObserver();
  if (_manualPlaceMode) _attachPlacementClickHandlers();

  if (targetWrapEl) {
    requestAnimationFrame(() => targetWrapEl.scrollIntoView({ block: 'start', behavior: 'instant' }));
  }
}

function resetPdfPreview(emptyMessage) {
  _currentRenderToken++;
  // Fix-20: тулбар теперь виден всегда (не зависит от состояния превью) —
  // сбрасывать его display здесь больше не нужно; пустое состояние — свои
  // фиксированные инструкции в разметке, перезаписывать innerHTML не нужно.
  const scrollEl = document.getElementById('pdf-canvas-scroll');
  const empty    = document.getElementById('pdf-preview-empty');
  if (scrollEl) { scrollEl.innerHTML = ''; scrollEl.style.display = 'none'; }
  if (empty) empty.style.display = 'flex';
  if (_pageObserver) { _pageObserver.disconnect(); _pageObserver = null; }
  const infoStrip = document.getElementById('pdf-preview-info-strip');
  if (infoStrip) infoStrip.style.display = '';
}

function _fallbackIframePreview(pdfBlobOrFile, pageNumber, label) {
  const scrollEl = document.getElementById('pdf-canvas-scroll');
  const empty    = document.getElementById('pdf-preview-empty');
  const lbl      = document.getElementById('pdf-preview-label');
  if (!scrollEl) return;
  const url = URL.createObjectURL(pdfBlobOrFile);
  const page = pageNumber > 1 ? '#page=' + pageNumber : '';
  scrollEl.innerHTML = `<iframe src="${url}${page}" style="width:100%;flex:1;border:none;min-height:500px"></iframe>`;
  scrollEl.style.display = 'flex';
  if (empty) empty.style.display = 'none';
  if (lbl) lbl.textContent = label || 'Предпросмотр';
  const infoStrip = document.getElementById('pdf-preview-info-strip');
  if (infoStrip) infoStrip.style.display = 'none';
}

// Convert DOC/DOCX to PDF on the server (LibreOffice) so the preview matches
// exactly what will be signed — the previous mammoth.js path threw away
// fonts, footers, and positioning.
async function convertDocxToPdfBlob(file) {
  const fd = new FormData();
  fd.append("file", file);
  const res = await apiFetch("/v1/me/convert", { method: "POST", body: fd });
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error(e.detail || "Не удалось конвертировать документ");
  }
  return await res.blob();
}

async function handleWorkFile(file) {
  const lowerName = file.name.toLowerCase();
  const allowedExt = [".pdf", ".doc", ".docx"];
  if (!allowedExt.some(ext => lowerName.endsWith(ext))) {
    return showWorkMsg("Только PDF, DOC, DOCX файлы", "error");
  }
  if (file.size > 5 * 1024 * 1024) {
    return showWorkMsg("Файл слишком большой (макс 5 МБ)", "error");
  }
  _workFile = file; _workAnchors = null;
  _signedBlob = null; _signedFilename = null;
  _workAnalyzeResult = null; _rememberedTemplateId = null;
  _manualAnchors = []; _excludePages = []; _manualPlaceMode = false;
  _updateToolbarActions();
  document.getElementById("work-result-card").style.display = "none";
  showWorkMsg("", "");

  // DOC/DOCX → convert on the server first (LibreOffice) so preview and
  // signed output are identical. From this point on _workFile is the PDF.
  const isDocx = /\.(doc|docx)$/i.test(file.name);
  if (isDocx) {
    showWorkSpinner("Конвертируем документ...");
    let pdfBlob;
    try {
      pdfBlob = await convertDocxToPdfBlob(file);
    } catch (e) {
      hideWorkSpinner();
      return showWorkMsg(e.message || "Не удалось конвертировать документ", "error");
    }
    const baseName = file.name.replace(/\.[^.]+$/, "");
    _workFile = new File([pdfBlob], baseName + ".pdf", { type: "application/pdf" });
    showPdfPreview(_workFile, 1, _buildPreviewLabel(null, _workFile.name));
  } else {
    showPdfPreview(file, 1, _buildPreviewLabel(null, _workFile.name));
  }

  showWorkSpinner("Анализируем документ...");

  const fd = new FormData();
  fd.append("file", _workFile);
  let res;
  try { res = await apiFetch("/v1/me/analyze", { method: "POST", body: fd }); }
  catch { hideWorkSpinner(); return showWorkMsg("Ошибка соединения", "error"); }

  hideWorkSpinner();

  if (res.status === 429) {
    showWorkMsg("Лимит документов исчерпан на этот месяц", "error");
    if (window.posthog) posthog.capture("limit_reached", {step: "analyze"});
    return loadWorkUsage();
  }
  if (res.status === 413) {
    const e = await res.json().catch(() => ({}));
    return showWorkMsg(e.detail || "Файл слишком большой", "error");
  }
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    return showWorkMsg(e.detail || "Ошибка анализа", "error");
  }

  const result = await res.json();
  _workAnchors = result.anchors || [];
  _workAnalyzeResult = result;
  _rememberedTemplateId = result.from_template ? (result.template_id || null) : null;
  // Fix-11: signing (below) re-renders the preview with its own label anyway —
  // this covers the case where it doesn't run (no anchors / signature not
  // ready yet) and the preview stays on the original, so the header still
  // reflects the just-completed analysis instead of the pre-analyze filename.
  const lblEl = document.getElementById('pdf-preview-label');
  if (lblEl) lblEl.textContent = _buildPreviewLabel(_workAnalyzeResult, _workFile.name);
  renderAnalysisResult(result);
  _updateToolbarActions();

  const n = _workAnchors.length;
  const signArea = document.getElementById("work-sign-area");
  if (n > 0 && _workSigReady) {
    showWorkSpinner("Подписываем...");
    await workSign();
    hideWorkSpinner();
  } else if (n > 0 && !_workSigReady) {
    if (signArea) signArea.innerHTML = `
      <div class="msg info" style="display:block; margin-top:0.5rem">
        ✏️ Найдено ${n} ${n === 1 ? 'место' : 'места/мест'} для подписи.
        Подпись не загружена — перейдите в раздел <strong>Подпись</strong> для загрузки.
      </div>`;
  }
}

function renderAnalysisResult(result) {
  const card = document.getElementById("work-result-card");
  if (!card) return;
  card.style.display = "block";

  // Fix-13: "Наша сторона" вместо traffic light + полного списка сторон —
  // confidence/traffic_light внутренняя dev-метрика, источник (свежий
  // анализ/шаблон) уже виден в шапке превью (Fix-11).
  const sideEl = document.getElementById("work-our-side");
  const ourSide = result.our_side || {};
  const synonyms = result.synonyms_used || {};
  const displayName = ourSide.signer || ourSide.legal_entity
    || synonyms.signer || synonyms.legal_entity || '';
  const roles = (ourSide.roles && ourSide.roles.length) ? ourSide.roles : (synonyms.roles || []);
  const alias = roles.length ? roles[0] : '';

  if (sideEl) {
    sideEl.innerHTML = displayName
      ? `<div style="font-size:14px;margin-bottom:0.4rem">
           Наша сторона: <strong>${displayName}</strong>${alias ? `, алиас: <strong>${alias}</strong>` : ''}
         </div>`
      : `<div style="font-size:14px;color:var(--c-muted);margin-bottom:0.4rem">Сторона не распознана</div>`;
  }

  const n = _workAnchors.length;
  document.getElementById("work-anchor-info").textContent =
    n > 0 ? `Мест для подписи: ${n}` : "Мест для подписи не найдено.";

  const signArea = document.getElementById("work-sign-area");
  if (n === 0) {
    signArea.innerHTML = `<p style="font-size:13px;color:var(--c-muted)">Попробуйте другой документ или шаблон подписи.</p>`;
  } else {
    signArea.innerHTML = '';
  }

  if (result.error) showWorkMsg(result.error, "info");
}

// Rough client-side "does this anchor survive exclude_pages" check — mirrors
// what the server does. Backend is source of truth; this only avoids a
// spurious "no anchors" error toast when the user has just erased everything.
function _anchorSurvivesExclude(a) {
  const ph = String(a.page_hint || "0");
  if (ph === "first") return !_excludePages.includes(1);
  if (ph === "last" || ph === "any") return true;  // can't resolve on client
  const n = parseInt(ph, 10);
  return Number.isNaN(n) ? true : !_excludePages.includes(n + 1);
}

async function workSign(preservePosition = false) {
  if (!_workFile) return;
  const surviving = (_workAnchors || []).filter(_anchorSurvivesExclude);
  const hasAnchors = surviving.length || _manualAnchors.length;

  // Everything erased → treat as "revert to unsigned" instead of surfacing a
  // "no anchors" error. Skip the server call entirely (no usage burned).
  if (!hasAnchors) {
    _signedBlob = null;
    _signedFilename = null;
    showPdfPreview(_workFile, _currentVisiblePage || 1, "Исходный документ");
    _updateToolbarActions();
    showWorkMsg("", "");
    return;
  }

  showWorkMsg("", "");

  const fd = new FormData();
  fd.append("file", _workFile);
  fd.append("anchors_json", JSON.stringify(_workAnchors || []));
  fd.append("manual_anchors_json", JSON.stringify(_manualAnchors));
  fd.append("exclude_pages_json", JSON.stringify(_excludePages));

  let res;
  try { res = await apiFetch("/v1/me/sign", { method: "POST", body: fd }); }
  catch { return showWorkMsg("Ошибка соединения", "error"); }

  if (res.status === 429) {
    showWorkMsg("Лимит документов исчерпан на этот месяц", "error");
    if (window.posthog) posthog.capture("limit_reached", {step: "sign"});
    loadWorkUsage();
    return;
  }
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    // Server also rejects "no anchors" — same fallback as the pre-flight branch
    // above, in case a "first"/"last"/"any" hint hid the empty-set from us.
    if (res.status === 422 && (e.detail || "").includes("Нет якорей")) {
      _signedBlob = null;
      _signedFilename = null;
      showPdfPreview(_workFile, _currentVisiblePage || 1, "Исходный документ");
      _updateToolbarActions();
      showWorkMsg("", "");
      return;
    }
    return showWorkMsg(e.detail || "Ошибка подписания", "error");
  }

  const blob = await res.blob();
  const baseName = _workFile.name.includes(".") ? _workFile.name.replace(/\.[^.]+$/, "") : _workFile.name;
  _signedFilename = "signed_" + baseName + ".pdf";
  _signedBlob = blob;

  // Fix-17: сохранить текущую позицию просмотра при пересборке после ручного
  // редактирования (стереть/добавить подпись) — прыжок на "первую страницу с
  // подписью" уместен только при самом первом авто-подписании после загрузки.
  const targetPage = preservePosition ? (_currentVisiblePage || 1) : _firstSignedPageNum();
  showPdfPreview(blob, targetPage, _buildPreviewLabel(_workAnalyzeResult, _workFile.name));
  _updateToolbarActions();

  if (window.posthog) posthog.capture("document_signed");
  loadWorkUsage();
}

// ── Fix-7: remember/forget templates, manual placement, page erase ─────────

function _updateRememberButton() {
  const btn = document.getElementById('btn-remember');
  if (!btn) return;
  const active = !!_rememberedTemplateId;
  btn.classList.toggle('active', active);
  btn.title = active ? 'Забыть шаблон' : 'Запомнить шаблон';
}

// Fix-20: инструменты видны всегда (Req 9) — неприменимые сейчас тускнеют
// через .disabled, а не пропадают из вёрстки через display:none.
function _updateToolbarActions() {
  const hasAnalyzed = !!_workAnalyzeResult;
  const hasSigned = !!_signedBlob;
  const rememberBtn = document.getElementById('btn-remember');
  const manualBtn = document.getElementById('btn-manual-place');
  const eraseBtn = document.getElementById('btn-erase-page');
  const dl = document.getElementById('btn-download');
  const sh = document.getElementById('btn-share');

  if (rememberBtn) rememberBtn.classList.toggle('disabled', !hasAnalyzed);
  if (manualBtn) manualBtn.classList.toggle('disabled', !_workSigReady);
  if (eraseBtn) eraseBtn.classList.toggle('disabled', !hasSigned);
  if (dl) dl.classList.toggle('disabled', !hasSigned);
  if (sh) {
    // navigator.canShare — возможность браузера, не состояние документа:
    // если её вообще нет, кнопку прячем совсем, а не тускним без толку.
    sh.style.display = navigator.canShare ? 'flex' : 'none';
    sh.classList.toggle('disabled', !hasSigned);
  }

  _updateRememberButton();
}

// Fix-10.1: remember the same set workSign() actually stamped — surviving
// auto/template anchors (minus excluded pages) plus manual placements — not
// the raw untouched analyze() output. Вынесено в отдельную функцию (Fix-17)
// — переиспользуется и ручным "Запомнить", и авто-пересохранением после
// правок при уже активном флаге.
function _buildRememberBody() {
  const fp = (_workAnalyzeResult && _workAnalyzeResult.fingerprint) || {};
  const survivingAuto = (_workAnchors || []).filter(_anchorSurvivesExclude);
  const manualAsAnchors = _manualAnchors.map(m => ({
    id: `manual_${m.page}_${Math.round(m.x)}_${Math.round(m.y)}`,
    anchor_level: 1,
    anchor_text: m.anchor_text || '',
    position: 'on',
    generated_pattern: '',
    bbox: [m.x, m.y, m.x + m.width, m.y + m.height],
    // TextAnchor.added_by is a two-value enum: "auto_regex" | "manual_click"
    // (signfinder-core/anchors/models.py) — "manual_click" is the established
    // provenance apply_template_anchors() checks for to reapply this bbox
    // exactly (no text search) when the remembered template matches again.
    added_by: 'manual_click',
    page_hint: String(m.page - 1),  // TextAnchor page_hint is 0-indexed; m.page is 1-indexed
    // Fix-12: смещение от текста-ориентира — для устойчивого повторного
    // применения (переживает небольшой реflow документа). context_before
    // переиспользуется как контейнер, т.к. для manual_click оно иначе не
    // используется (apply_template_anchors проверяет его только в regex-ветке).
    context_before: m.anchor_bbox ? JSON.stringify({
      anchor_bbox: m.anchor_bbox, offset_dx: m.offset_dx, offset_dy: m.offset_dy,
    }) : '',
  }));
  return {
    fingerprint: fp,
    anchors: [...survivingAuto, ...manualAsAnchors],
    language: fp.language || 'ru',
    synonyms_used: (_workAnalyzeResult && _workAnalyzeResult.synonyms_used) || {},
  };
}

window.toggleRememberTemplate = async function() {
  if (!_workAnalyzeResult) return;
  const btn = document.getElementById('btn-remember');
  if (btn) btn.disabled = true;
  try {
    if (_rememberedTemplateId) {
      const res = await apiFetch(`/v1/me/templates/${_rememberedTemplateId}`, { method: 'DELETE' });
      if (res.ok || res.status === 404) {
        _rememberedTemplateId = null;
        showWorkMsg('Шаблон забыт', 'success');
      } else {
        showWorkMsg('Не удалось забыть шаблон', 'error');
      }
    } else {
      const res = await apiFetch('/v1/me/templates/remember', { method: 'POST', body: JSON.stringify(_buildRememberBody()) });
      if (res.ok) {
        const data = await res.json();
        _rememberedTemplateId = data.template_id;
        showWorkMsg('Шаблон запомнен', 'success');
      } else {
        showWorkMsg('Не удалось запомнить шаблон', 'error');
      }
    }
  } catch {
    showWorkMsg('Ошибка соединения', 'error');
  }
  if (btn) btn.disabled = false;
  _updateRememberButton();
};

// Fix-17: если шаблон уже запомнен и пользователь стирает/добавляет подпись
// вручную — обновить сохранённый шаблон автоматически, без повторного
// нажатия "Забыть" + "Запомнить". У /v1/me/templates/remember нет режима
// обновления на месте (всегда создаёт новый template_id) — обновление
// делаем как забыть старый + запомнить заново, прозрачно для пользователя.
async function _autoResaveRememberedTemplate() {
  if (!_rememberedTemplateId || !_workAnalyzeResult) return;
  const oldId = _rememberedTemplateId;
  try {
    await apiFetch(`/v1/me/templates/${oldId}`, { method: 'DELETE' });
    const res = await apiFetch('/v1/me/templates/remember', { method: 'POST', body: JSON.stringify(_buildRememberBody()) });
    if (res.ok) {
      const data = await res.json();
      _rememberedTemplateId = data.template_id;
    } else {
      _rememberedTemplateId = null;
      showWorkMsg('Не удалось обновить сохранённый шаблон — запомните заново', 'error');
    }
  } catch {
    _rememberedTemplateId = null;
    showWorkMsg('Не удалось обновить сохранённый шаблон — запомните заново', 'error');
  }
  _updateRememberButton();
}

// canvas CSS-pixel offset → PDF points. fitz/PyMuPDF (signfinder-core) uses a
// top-left-origin, Y-down coordinate system — same orientation as <canvas> —
// so this is a plain unscale, no Y-flip (unlike raw bottom-up PDF coordinates).
function canvasToPdfCoords(canvasX, canvasY, pageCanvas) {
  const scale = (pageCanvas && pageCanvas._pdfScale) || 1;
  return { x: canvasX / scale, y: canvasY / scale };
}

async function _getSignatureImgUrl() {
  if (_signatureImgUrl) return _signatureImgUrl;
  const token = await refreshToken();
  let res;
  try {
    res = await fetch("/api/v1/me/signature", { headers: { Authorization: "Bearer " + token } });
  } catch { return null; }
  if (!res.ok) return null;
  const blob = await res.blob();
  _signatureImgUrl = URL.createObjectURL(blob);
  return _signatureImgUrl;
}

window.toggleManualPlaceMode = async function() {
  if (!_workFile) return;
  if (!_workSigReady) { showWorkMsg('Сначала загрузите подпись в разделе «Подпись»', 'error'); return; }
  _manualPlaceMode = !_manualPlaceMode;
  const btn = document.getElementById('btn-manual-place');
  if (btn) btn.classList.toggle('active', _manualPlaceMode);
  if (_manualPlaceMode) {
    const url = await _getSignatureImgUrl();
    if (!url) {
      showWorkMsg('Не удалось загрузить подпись', 'error');
      _manualPlaceMode = false;
      if (btn) btn.classList.remove('active');
      return;
    }
    showWorkMsg('Нажмите на документ там, где нужно поставить подпись', 'info');
    _attachPlacementClickHandlers();
  } else {
    _detachPlacementClickHandlers();
    showWorkMsg('', '');
  }
};

function _attachPlacementClickHandlers() {
  document.querySelectorAll('.pdf-page-wrap').forEach(wrap => {
    wrap.classList.add('placing');
    wrap.addEventListener('click', _onPagePlaceClick);
  });
}
function _detachPlacementClickHandlers() {
  document.querySelectorAll('.pdf-page-wrap').forEach(wrap => {
    wrap.classList.remove('placing');
    wrap.removeEventListener('click', _onPagePlaceClick);
  });
}

async function _onPagePlaceClick(e) {
  if (!_manualPlaceMode || _activePlacer) return;
  if (e.target.closest('.sig-placer')) return;
  const wrap = e.currentTarget;
  const canvas = wrap.querySelector('canvas');
  if (!canvas) return;
  const rect = wrap.getBoundingClientRect();
  const clickX = e.clientX - rect.left;
  const clickY = e.clientY - rect.top;
  const imgUrl = await _getSignatureImgUrl();

  const defaultW = Math.min(130, rect.width * 0.5);
  const defaultH = defaultW * 0.42;
  const left = Math.max(0, Math.min(clickX - defaultW / 2, rect.width - defaultW));
  const top  = Math.max(0, Math.min(clickY - defaultH / 2, rect.height - defaultH));

  const placer = document.createElement('div');
  placer.className = 'sig-placer';
  placer.style.left = left + 'px';
  placer.style.top = top + 'px';
  placer.style.width = defaultW + 'px';
  placer.style.height = defaultH + 'px';
  placer.innerHTML = `
    <img src="${imgUrl || ''}" draggable="false">
    <div class="sig-placer-handle"></div>
    <div class="sig-placer-controls">
      <button class="sig-placer-confirm" type="button" title="Подтвердить">✓</button>
      <button class="sig-placer-cancel" type="button" title="Отменить">×</button>
    </div>`;
  wrap.appendChild(placer);
  _activePlacer = { el: placer, wrap, canvas };

  _wirePlacerDrag(placer, wrap);
  placer.querySelector('.sig-placer-confirm').addEventListener('click', (ev) => { ev.stopPropagation(); _confirmPlacer(); });
  placer.querySelector('.sig-placer-cancel').addEventListener('click', (ev) => { ev.stopPropagation(); _cancelPlacer(); });
}

function _wirePlacerDrag(placer, wrap) {
  let mode = null; // 'move' | 'resize'
  let startX, startY, startLeft, startTop, startW, startH;

  function onMove(e) {
    if (!mode) return;
    const dx = e.clientX - startX, dy = e.clientY - startY;
    const wrapRect = wrap.getBoundingClientRect();
    if (mode === 'move') {
      const left = Math.max(0, Math.min(startLeft + dx, wrapRect.width - startW));
      const top  = Math.max(0, Math.min(startTop + dy, wrapRect.height - startH));
      placer.style.left = left + 'px';
      placer.style.top = top + 'px';
    } else {
      const w = Math.max(40, Math.min(startW + dx, wrapRect.width - startLeft));
      const h = Math.max(20, Math.min(startH + dy, wrapRect.height - startTop));
      placer.style.width = w + 'px';
      placer.style.height = h + 'px';
    }
  }
  function onUp() {
    mode = null;
    window.removeEventListener('pointermove', onMove);
    window.removeEventListener('pointerup', onUp);
  }
  function startDrag(resize) {
    return (e) => {
      mode = resize ? 'resize' : 'move';
      startX = e.clientX; startY = e.clientY;
      startLeft = parseFloat(placer.style.left);
      startTop = parseFloat(placer.style.top);
      startW = parseFloat(placer.style.width);
      startH = parseFloat(placer.style.height);
      e.preventDefault();
      e.stopPropagation();
      window.addEventListener('pointermove', onMove);
      window.addEventListener('pointerup', onUp);
    };
  }

  placer.addEventListener('pointerdown', startDrag(false));
  placer.querySelector('.sig-placer-handle').addEventListener('pointerdown', startDrag(true));
}

async function _confirmPlacer() {
  if (!_activePlacer) return;
  const { el, wrap, canvas } = _activePlacer;
  const left = parseFloat(el.style.left);
  const top = parseFloat(el.style.top);
  const w = parseFloat(el.style.width);
  const h = parseFloat(el.style.height);
  const scale = canvas._pdfScale || 1;
  const topLeftPdf = canvasToPdfCoords(left, top, canvas);
  const pageNum = parseInt(wrap.dataset.pageNum, 10);
  const widthPt = w / scale, heightPt = h / scale;

  // Fix-12: определить текст-ориентир и смещение для устойчивой повторной
  // простановки через шаблон (переживает небольшой реflow документа)
  let anchorProbe = { anchor_text: '', anchor_bbox: null, offset_dx: 0, offset_dy: 0 };
  try {
    const fd = new FormData();
    fd.append('file', _workFile);
    fd.append('page', pageNum);
    fd.append('x', topLeftPdf.x);
    fd.append('y', topLeftPdf.y);
    fd.append('width', widthPt);
    fd.append('height', heightPt);
    const res = await apiFetch('/v1/me/manual-anchor/probe', { method: 'POST', body: fd });
    if (res.ok) anchorProbe = await res.json();
  } catch { /* probe необязателен — при неудаче просто нет текстовой привязки */ }

  _manualAnchors.push({
    page: pageNum,
    x: topLeftPdf.x,
    y: topLeftPdf.y,
    width: widthPt,
    height: heightPt,
    anchor_text: anchorProbe.anchor_text || '',
    anchor_bbox: anchorProbe.anchor_bbox || null,
    offset_dx: anchorProbe.offset_dx || 0,
    offset_dy: anchorProbe.offset_dy || 0,
  });

  el.remove();
  _activePlacer = null;
  _manualPlaceMode = false;
  const btn = document.getElementById('btn-manual-place');
  if (btn) btn.classList.remove('active');
  _detachPlacementClickHandlers();

  showWorkSpinner('Подписываем...');
  await workSign(true);
  await _autoResaveRememberedTemplate();
  hideWorkSpinner();
}

function _cancelPlacer() {
  if (!_activePlacer) return;
  _activePlacer.el.remove();
  _activePlacer = null;
}

function _attachPageObserver() {
  if (_pageObserver) { _pageObserver.disconnect(); _pageObserver = null; }
  const scrollEl = document.getElementById('pdf-canvas-scroll');
  if (!scrollEl) return;
  const wraps = scrollEl.querySelectorAll('.pdf-page-wrap');
  if (!wraps.length) return;

  const visibility = new Map();
  _pageObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const pn = parseInt(entry.target.dataset.pageNum, 10);
      visibility.set(pn, entry.intersectionRatio);
    });
    let best = null, bestRatio = 0;
    visibility.forEach((ratio, pn) => {
      if (ratio > bestRatio) { bestRatio = ratio; best = pn; }
    });
    if (best) _currentVisiblePage = best;
  }, { root: scrollEl, threshold: [0, 0.25, 0.5, 0.75, 1] });

  wraps.forEach(w => _pageObserver.observe(w));
}

window.eraseCurrentPageSignature = async function() {
  const page = _currentVisiblePage || 1;
  const before = _manualAnchors.length;
  _manualAnchors = _manualAnchors.filter(a => a.page !== page);
  if (_manualAnchors.length === before) {
    if (_excludePages.includes(page)) {
      return showWorkMsg('На этой странице уже нет подписи', 'info');
    }
    _excludePages.push(page);
  }
  showWorkSpinner('Обновляем...');
  await workSign(true);
  await _autoResaveRememberedTemplate();
  hideWorkSpinner();
};

window.downloadSignedPdf = function() {
  if (!_signedBlob) return;
  const url = URL.createObjectURL(_signedBlob);
  const a = document.createElement('a');
  a.href = url; a.download = _signedFilename || 'signed.pdf';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 10000);
};

window.shareSignedPdf = async function() {
  if (!_signedBlob) return;
  const file = new File([_signedBlob], _signedFilename || 'signed.pdf', { type: 'application/pdf' });
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({ files: [file], title: _signedFilename });
      return;
    } catch (e) {
      if (e.name === 'AbortError') return;
    }
  }
  window.downloadSignedPdf();
};

function showWorkMsg(text, type) {
  const el = document.getElementById("work-msg");
  if (!el) return;
  el.className = "msg" + (type ? " " + type : "");
  el.textContent = text;
}
function showWorkSpinner(text) {
  const sp = document.getElementById("work-spinner");
  const t  = document.getElementById("work-spinner-text");
  // Fix-20: спиннер — тонкая строка в панели превью, иконка вращается через
  // CSS (.work-spinner-icon), текст без эмодзи-префикса (эмодзи теперь
  // отдельный элемент).
  if (sp) sp.style.display = "flex";
  if (t)  t.textContent = text;
}
function hideWorkSpinner() {
  const sp = document.getElementById("work-spinner");
  if (sp) sp.style.display = "none";
}

window.signOut = async () => { await fbSignOut(auth); };
window.showRegister = () => {
  document.getElementById("form-signin").style.display = "none";
  document.getElementById("form-register").style.display = "block";
};
window.showSignin = () => {
  document.getElementById("form-register").style.display = "none";
  document.getElementById("form-signin").style.display = "block";
};

function showMsg(text, type) {
  const el = document.getElementById("auth-msg");
  el.className = "msg " + type; el.textContent = text;
}
function clearMsg() {
  document.getElementById("auth-msg").className = "msg";
}
function friendlyError(code) {
  return ({
    "auth/wrong-password": "Неверный пароль",
    "auth/user-not-found": "Пользователь не найден",
    "auth/email-already-in-use": "Email уже зарегистрирован",
    "auth/weak-password": "Пароль слишком слабый",
    "auth/invalid-email": "Некорректный email",
    "auth/too-many-requests": "Слишком много попыток — попробуйте позже",
    "auth/invalid-credential": "Неверный email или пароль",
  })[code] || "Ошибка входа";
}
